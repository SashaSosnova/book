name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm deps
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Prepare artifact
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/release/app-release.apk release/tom-sawyer.apk
          ls -lh release/tom-sawyer.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tom-sawyer-apk
          path: release/tom-sawyer.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Том Сойер ${{ github.ref_name }}
          body: |
            ## Установка
            1. Удалите старую версию приложения, если была
            2. Скачайте **tom-sawyer.apk**
            3. Разрешите установку из неизвестных источников
            4. Установите APK

            Если снова ошибка — пришлите модель телефона и версию Android.
          files: release/tom-sawyer.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
