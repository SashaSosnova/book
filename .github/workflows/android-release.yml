name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm deps
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build installable APKs
        working-directory: android
        run: |
          chmod +x gradlew
          # Debug APK — самый надёжный вариант для установки без Play Store
          ./gradlew assembleDebug assembleRelease --no-daemon

      - name: Prepare artifact
        run: |
          mkdir -p release
          # Основной файл для установки — debug (стабильно ставится на телефоны)
          cp android/app/build/outputs/apk/debug/app-debug.apk release/tom-sawyer.apk
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            cp android/app/build/outputs/apk/release/app-release.apk release/tom-sawyer-release.apk
          fi
          ls -lh release/
          # Проверка zip-структуры
          python3 - <<'PY'
          import zipfile
          z = zipfile.ZipFile('release/tom-sawyer.apk')
          info = z.getinfo('resources.arsc')
          print('resources.arsc compress_type=', info.compress_type, 'file_size=', info.file_size)
          sigs = [n for n in z.namelist() if n.startswith('META-INF/')]
          print('signatures:', sigs)
          assert any(n.endswith('.RSA') or n.endswith('.EC') or n.endswith('MANIFEST.MF') for n in sigs), 'APK is not signed'
          PY

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tom-sawyer-apk
          path: release/*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v1.0.{0}', github.run_number) }}
          name: Том Сойер ${{ github.ref_type == 'tag' && github.ref_name || format('v1.0.{0}', github.run_number) }}
          body: |
            ## Установка
            1. Скачайте **tom-sawyer.apk**
            2. Если уже стояла старая версия — удалите её
            3. Разрешите установку из неизвестных источников
            4. Откройте APK и установите

            Если снова пишет «приложение не установлено» — напишите модель телефона и версию Android.
          files: |
            release/tom-sawyer.apk
            release/tom-sawyer-release.apk
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
