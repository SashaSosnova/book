name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm deps
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Prepare artifact
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/release/app-release.apk release/tom-sawyer.apk
          ls -lh release/tom-sawyer.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tom-sawyer-apk
          path: release/tom-sawyer.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Том Сойер ${{ github.ref_name }}
          body: |
            ## Установка
            1. Удалите старую версию, если была
            2. Скачайте APK по одной из ссылок ниже
            3. Разрешите установку из неизвестных источников

            ### Ссылки
            - GitHub: файл `tom-sawyer.apk` в этом релизе
            - Зеркало (если GitHub не открывается): https://cdn.jsdelivr.net/gh/SashaSosnova/book@main/public-releases/tom-sawyer.apk
          files: release/tom-sawyer.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update APK mirror in repo
        if: success() && startsWith(github.ref, 'refs/tags/')
        run: |
          cp release/tom-sawyer.apk /tmp/tom-sawyer.apk
          git fetch origin main
          git checkout -B main origin/main
          mkdir -p public-releases
          cp /tmp/tom-sawyer.apk public-releases/tom-sawyer.apk
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public-releases/tom-sawyer.apk
          git diff --staged --quiet && echo "No APK mirror changes" && exit 0
          git commit -m "Update APK mirror for ${{ github.ref_name }}"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}