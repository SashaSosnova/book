name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm deps
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Prepare artifact
        run: |
          mkdir -p release
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            cp android/app/build/outputs/apk/release/app-release.apk release/tom-sawyer.apk
          else
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk release/tom-sawyer.apk
          fi
          ls -lh release/tom-sawyer.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tom-sawyer-apk
          path: release/tom-sawyer.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Том Сойер v1.0.${{ github.run_number }}
          body: |
            APK для установки на Android.

            1. Скачайте `tom-sawyer.apk`
            2. На телефоне разрешите установку из неизвестных источников
            3. Откройте файл и установите
          files: release/tom-sawyer.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
